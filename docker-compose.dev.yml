# 开发用：容器内跑 Vite dev server，挂载本地源码，支持热重载。
# 用法：docker compose -f docker-compose.dev.yml up
services:
  web-dev:
    image: oven/bun:1.3.13
    working_dir: /app/web
    command: sh -c "bun install && bun run dev"
    environment:
      # Windows/Mac 的 bind mount 收不到原生文件事件，开启轮询让 HMR 生效。
      - VITE_DEV_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app/web
      - ./VERSION:/app/VERSION:ro
      - ./CHANGELOG.md:/app/CHANGELOG.md:ro
      # 匿名卷保护容器内安装的依赖，避免被宿主机目录覆盖。
      - /app/web/node_modules
    restart: unless-stopped
